<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Địa chỉ mới</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div class="modal">
    <div class="modal-container">
      <h2>Địa chỉ mới</h2>

        <form class="address-form">
            <div class="form-row">
                <input type="text" placeholder="Họ và tên" required>
                <input type="tel" placeholder="Số điện thoại" required>
            </div>

            <div class="form-row">
                <input type="text" placeholder="Tỉnh/Thành Phố, Quận/Huyện, Phường/Xã">
            </div>

            <div class="form-row">
                <input type="text" placeholder="Địa chỉ cụ thể">
            </div>

            <div class="form-group">
                <label>Loại địa chỉ:</label>
                <div class="address-type">
                    <button type="button" class="type-btn active">Nhà Riêng</button>
                    <button type="button" class="type-btn">Văn Phòng</button>
                </div>
            </div>

            <div class="form-footer">
            <label><input type="checkbox"> Đặt làm địa chỉ mặc định</label>
            </div>

            <div class="form-actions">
                <a href="checkout.html"><button type="button" class="btn-cancel">Trở Lại</button></a>
                <button type="submit" class="btn-submit">Lưu Thông Tin</button>
            </div>
        </form>
    </div>
  </div>
</body>
</html>
