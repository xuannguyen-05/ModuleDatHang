<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="./assets/css/base.css">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Shop Giày Dép</title>
</head>
<body>
    <div class="app">
        <div id="header-placeholder"></div>

        <div class="app__container">
            <div class="productDeatil">
                <img src="./assets/img/giayxakho.jpg" alt="" class="productDeatil_img">
                <div class="productDeatil_content">
                    <b class="productDeatil_name">Giày đá bóng cỏ nhân tạo adidas F50 Pro TF Coral Blaze - Beam Orange/Lucid Blue/Footwear White JH7664</b>
                    <div class="productDeatil_commet">
                        <div class="commet_start ">
                            <span class="commet_SoLuongStar">5</span>
                            <i class="home-product-item__start-gold fa-solid fa-star"></i>
                            <i class="home-product-item__start-gold fa-solid fa-star"></i>
                            <i class="home-product-item__start-gold fa-solid fa-star"></i>
                            <i class="home-product-item__start-gold fa-solid fa-star"></i>
                            <i class="home-product-item__start-gold fa-solid fa-star"></i>
                        </div>
                        <div class="commet_text">
                            <div class="commet_textSoLuong">23</div>
                            <span class="commet_text-DanhGia">Đánh Giá</span>
                        </div>
                    </div>

                    <div class="productDeatil_price">
                        <div class="productDeatil_priceNew">350.900đ</div>
                        <div class="productDeatil_priceOld">450.800đ</div>
                        <div class="productDeatil_priceDiscount">-12%</div>
                    </div>

                    <div class="productDeatil_color">
                        <span class="productDeatil_color_name">Màu Sắc </span>
                        <div class="productDeatil_colorBtn">
                            <button class="home-filter-btn btn btnsize">Màu vàng</button>
                            <button class="home-filter-btn btn btnsize">Màu Trắng</button>
                        </div>
                    </div>

                    <div class="productDeatil_size">
                        <span class="productDeatil_size_name">SiZe</span>
                        <div class="productDeatil_sizeBtn">
                            <button class="home-filter-btn btn btnsize">37</button>
                            <button class="home-filter-btn btn btnsize">38</button>
                            <button class="home-filter-btn btn btnsize">39</button>
                            <button class="home-filter-btn btn btnsize">40</button>
                            <button class="home-filter-btn btn btnsize">41</button>
                            <button class="home-filter-btn btn btnsize">42</button>
                            <button class="home-filter-btn btn btnsize">43</button>
                            <button class="home-filter-btn btn btnsize">44</button>
                            <button class="home-filter-btn btn btnsize">45</button>
                            <button class="home-filter-btn btn btnsize">46</button>

                        </div>
                    </div>

                    <div class="productDeatil_Quantity">
                        <span class="productDeatil_QuantityName">Số Lượng</span>
                        <input class="productDeatil_QuantityInt" type="number" value="1" min="1" max="100">
                    </div>

                    <div class="productDeatil_by">
                            <a href="cart.html"><button class="home-filter-btn btn productDeatil_by_btncart">
                            <i class=" fa fa-shopping-cart" aria-hidden="true"></i>
                            Thêm Vào Giỏ Hàng
                        </button></a>
                        <a href="checkout.html" class="home-filter-btn btn productDeatil_by_btnnew">Mua Ngay</a>
                    </div>


                </div>
            </div>
            

        </div>

        <div id="footer-placeholder"></div>
    </div>

    
</div>

    <script src="assets/js/layout-loader.js"></script>
    
</body>

</html>
